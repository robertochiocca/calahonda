name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install ruff black pytest-cov

      - name: Lint (ruff)
        run: ruff check .

      - name: Formatação (black)
        run: black --check .

      - name: Testes com cobertura
        run: pytest -v --cov=calahonda_var --cov-report=term --cov-fail-under=85

      - name: Rodar o exemplo (offline, dados sintéticos)
        run: python examples/example_var.py
